<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />

    <!-- Title -->
    <title>Arkey Games | Telegram Mini App</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Play exciting games, earn rewards, manage your account, and enjoy a seamless gaming experience with the Arkey Games Telegram Mini App."
    />

    <meta
      name="keywords"
      content="Arkey Games, Telegram Mini App, Gaming, Telegram Bot, Rewards, Casino, Mini App"
    />

    <meta
      name="author"
      content="Arkey Games"
    />

    <meta
      name="robots"
      content="index, follow"
    />

    <!-- Theme -->
    <meta
      name="theme-color"
      content="#0F172A"
    />

    <meta
      name="color-scheme"
      content="dark light"
    />

    <!-- Icons -->
    <link
      rel="icon"
      href="%PUBLIC_URL%/favicon.ico"
    />

    <link
      rel="apple-touch-icon"
      href="%PUBLIC_URL%/logo192.png"
    />

    <!-- Manifest -->
    <link
      rel="manifest"
      href="%PUBLIC_URL%/manifest.json"
    />

    <!-- Performance -->
    <link
      rel="preconnect"
      href="https://telegram.org"
    />

    <!-- Open Graph -->
    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:title"
      content="Arkey Games"
    />

    <meta
      property="og:description"
      content="Play games, earn rewards, and experience the next generation of Telegram gaming."
    />

    <meta
      property="og:image"
      content="%PUBLIC_URL%/logo512.png"
    />

    <!-- Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="Arkey Games"
    />

    <meta
      name="twitter:description"
      content="The ultimate Telegram Mini App for gaming and rewards."
    />

    <meta
      name="twitter:image"
      content="%PUBLIC_URL%/logo512.png"
    />

    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>

  <body>
    <noscript>
      JavaScript is required to run Arkey Games.
    </noscript>

    <div id="root"></div>
  </body>
</html>
